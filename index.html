<!-- workspace/templates/drivers.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Management - Drivers</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div class="flex min-h-screen">
        <!-- Sidebar Navigation -->
        <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col gap-6">
            <h1 class="text-xl font-bold tracking-wider">LogiTrack</h1>
            <nav class="flex flex-col gap-2">
                <a href="dashboard.html" class="hover:bg-slate-800 px-4 py-2.5 rounded-lg font-medium transition">Dashboard</a>
                <a href="vehicles.html" class="hover:bg-slate-800 px-4 py-2.5 rounded-lg font-medium transition">Vehicles</a>
                <a href="drivers.html" class="bg-blue-600 px-4 py-2.5 rounded-lg font-medium transition">Drivers</a>
                <a href="trips.html" class="hover:bg-slate-800 px-4 py-2.5 rounded-lg font-medium transition">Trips & Bookings</a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 p-8 max-w-4xl">
            <header class="mb-8">
                <h2 class="text-3xl font-bold text-slate-900">Driver Registration</h2>
                <p class="text-slate-500 mt-1">Onboard network personnel and track their regulatory commercial licensing.</p>
            </header>

            <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
                <form action="#" method="POST" class="flex flex-col gap-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">First Name</label>
                            <input type="text" placeholder="John" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Last Name</label>
                            <input type="text" placeholder="Doe" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Commercial Driver's License (CDL) Number</label>
                            <input type="text" placeholder="DL-9923847-X" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">License Class / Type</label>
                            <select class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option>Class A (Combination Vehicles)</option>
                                <option>Class B (Heavy Straight Vehicles)</option>
                                <option>Class C (Standard Commercial Commercial)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">License Expiration Date</label>
                            <input type="date" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Contact Phone Number</label>
                            <input type="tel" placeholder="+1 (555) 000-0000" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    
                    <hr class="border-slate-100 my-2">

                    <div class="flex justify-end gap-3">
                        <button type="button" class="px-5 py-2.5 rounded-lg border border-slate-200 font-medium text-slate-600 hover:bg-slate-50 transition">Cancel</button>
                        <button type="submit" class="px-5 py-2.5 rounded-lg bg-blue-600 font-medium text-white hover:bg-blue-700 transition">Complete Registration</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
